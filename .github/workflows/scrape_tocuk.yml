name: Scrape Tesla Owners UK Events

# Fetches Ti.to checkout JSON + per-event ICS each run so cancellations and
# schedule changes always propagate to subscribers (SEQUENCE / DTSTAMP).
on:
  schedule:
    # Run weekly on Mondays at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Use Node 24 for JavaScript-based actions (GitHub is deprecating Node 20 runners)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          # Optional: override when GitHub Pages is not at evenwebb/tesla-owners-club-uk-events-calendar
          CALENDAR_SITE_URL: ${{ vars.CALENDAR_SITE_URL }}
        run: |
          python tocuk_scraper.py || {
            echo "Transient failure, retrying in 10 seconds..."
            sleep 10
            python tocuk_scraper.py
          }

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Tesla Owners UK events calendar"
            git push
          fi
